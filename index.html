<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal Bridge | IPC to BNS Expert</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
        .glow-border { border: 1px solid rgba(59, 130, 246, 0.3); }
        .bns-gradient { background: linear-gradient(135deg, #059669 0%, #10b981 100%); }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 min-h-screen selection:bg-blue-500/30">

    <div class="max-w-5xl mx-auto px-4 py-10">
        <header class="text-center mb-12">
            <h1 class="text-6xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-indigo-400 to-emerald-400">
                Legal Bridge
            </h1>
            <p class="text-slate-400 mt-4 text-lg font-light tracking-wide">
                Advanced AI Mapping: IPC 1860 <span class="mx-2 text-blue-500">→</span> BNS 2023
            </p>
        </header>

        <div class="glass-card glow-border p-8 rounded-[2rem] shadow-2xl mb-10">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-1 relative">
                    <input type="text" id="lawQuery" 
                        class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-6 py-5 text-xl focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition-all uppercase placeholder:capitalize placeholder:text-slate-600"
                        placeholder="Enter IPC (e.g. 124A, 302, 498A)"
                        onkeypress="if(event.key === 'Enter') searchLaw()">
                </div>
                <button onclick="searchLaw()" id="searchBtn"
                    class="bg-blue-600 hover:bg-blue-500 text-white px-12 py-5 rounded-2xl font-bold text-lg transition-all transform active:scale-95 shadow-lg shadow-blue-900/20">
                    Analyze
                </button>
            </div>
            <div class="flex gap-4 mt-4 ml-2">
                <span class="text-[10px] text-slate-500 border border-slate-800 px-2 py-1 rounded">ALPHANUMERIC ENABLED</span>
                <span class="text-[10px] text-slate-500 border border-slate-800 px-2 py-1 rounded">MULTI-SECTION MAPPING</span>
            </div>
        </div>

        <div id="resultCard" class="hidden space-y-8 animate-in fade-in slide-in-from-bottom-5 duration-700">
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-slate-900/40 border border-slate-800 p-8 rounded-3xl">
                    <span class="text-blue-400 text-[10px] font-bold uppercase tracking-[0.2em]">Original IPC</span>
                    <h2 id="ipcDisplay" class="text-5xl font-black mt-3 text-white">SEC_---</h2>
                </div>

                <div class="bns-gradient p-8 rounded-3xl shadow-xl shadow-emerald-900/20 md:col-span-2 relative overflow-hidden">
                    <div class="relative z-10">
                        <span class="text-emerald-100 text-[10px] font-bold uppercase tracking-[0.2em]">Primary BNS Equivalent</span>
                        <h2 id="bnsDisplay" class="text-5xl font-black mt-3 text-white">SEC_---</h2>
                        
                        <div id="relatedContainer" class="mt-6 flex flex-wrap gap-2 items-center hidden">
                            <span class="text-[10px] font-bold text-emerald-900 bg-emerald-100/30 px-2 py-1 rounded">RELATED:</span>
                            <div id="relatedList" class="flex flex-wrap gap-2"></div>
                        </div>
                    </div>
                    <div class="absolute -right-4 -bottom-4 opacity-10">
                        <svg width="160" height="160" viewBox="0 0 24 24" fill="white"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
                    </div>
                </div>
            </div>

            <div class="glass-card border border-slate-800 rounded-[2.5rem] overflow-hidden shadow-inner">
                <div class="bg-slate-900/80 px-10 py-5 border-b border-slate-800 flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <div class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></div>
                        <h3 class="font-bold text-slate-300 tracking-tight">Expert Transition Analysis</h3>
                    </div>
                    <span class="text-[10px] text-slate-500 font-mono">GROQ LLAMA 3.3 70B</span>
                </div>
                <div id="analysisText" class="p-10 text-slate-300 leading-relaxed text-lg space-y-6">
                    </div>
            </div>
        </div>

        <footer class="mt-20 text-center text-slate-600 text-sm">
            <p>© 2026 Legal Bridge Intelligence • Verified BNS 2023 Data</p>
        </footer>
    </div>

    <script>
        async function searchLaw() {
            const queryInput = document.getElementById('lawQuery').value.trim();
            const btn = document.getElementById('searchBtn');
            const resultCard = document.getElementById('resultCard');
            const relatedContainer = document.getElementById('relatedContainer');
            const relatedList = document.getElementById('relatedList');
            
            if (!queryInput) return;

            // Loading state
            btn.innerHTML = `<span class="flex items-center gap-3"><svg class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Processing</span>`;
            btn.disabled = true;

            try {
                // Ensure this URL is correct for your Render Deployment
                const response = await fetch('https://ipc-to-bns.onrender.com/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: queryInput })
                });

                const data = await response.json();

                if (data.error) {
                    alert("Error: " + data.error);
                } else {
                    resultCard.classList.remove('hidden');
                    
                    // Update Primary Displays
                    document.getElementById('ipcDisplay').innerText = "SEC_" + queryInput.toUpperCase();
                    document.getElementById('bnsDisplay').innerText = "SEC_" + data.bns_section;
                    
                    // Handle Related Sections Logic (The Many-to-Many fix)
                    relatedList.innerHTML = "";
                    if (data.related_bns && data.related_bns.length > 0) {
                        relatedContainer.classList.remove('hidden');
                        data.related_bns.forEach(sec => {
                            const span = document.createElement('span');
                            span.className = "bg-white/20 text-white text-[11px] font-bold px-3 py-1 rounded-full border border-white/10";
                            span.innerText = "SEC_" + sec;
                            relatedList.appendChild(span);
                        });
                    } else {
                        relatedContainer.classList.add('hidden');
                    }

                    // Rich Text Formatting for AI Analysis
                    const formattedText = data.analysis
                        .replace(/\*\*(.*?)\*\*/g, '<strong class="text-white font-semibold">$1</strong>')
                        .replace(/\n\* /g, '<br>• ')
                        .replace(/\n- /g, '<br>• ')
                        .replace(/\n\d\. /g, (match) => `<br>${match.trim()} `)
                        .replace(/\n/g, '<br>');
                    
                    document.getElementById('analysisText').innerHTML = formattedText;
                    
                    // Scroll animation
                    window.scrollTo({ top: resultCard.offsetTop - 50, behavior: 'smooth' });
                }
            } catch (err) {
                console.error(err);
                alert("Backend not reachable. It might be 'sleeping' on Render. Try again in 20 seconds.");
            } finally {
                btn.innerText = "Analyze";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
