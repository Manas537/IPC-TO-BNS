<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal Bridge | IPC to BNS Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); }
        .glow-shadow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">

    <div class="max-w-4xl mx-auto px-4 py-12">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-400">
                Legal Bridge
            </h1>
            <p class="text-slate-400 mt-4 text-lg">Transitioning Indian Justice: IPC 1860 to BNS 2023</p>
        </div>

        <div class="glass-card border border-slate-700 p-8 rounded-3xl glow-shadow mb-8">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-1 relative">
                    <input type="text" id="lawQuery" 
                        class="w-full bg-slate-900 border border-slate-600 rounded-2xl px-6 py-4 text-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all uppercase placeholder:normal-case"
                        placeholder="Enter Section (e.g. 124A, 302, 420)"
                        onkeypress="if(event.key === 'Enter') searchLaw()">
                </div>
                <button onclick="searchLaw()" id="searchBtn"
                    class="bg-blue-600 hover:bg-blue-500 text-white px-10 py-4 rounded-2xl font-bold text-lg transition-all transform hover:scale-105 active:scale-95 shadow-lg shadow-blue-900/20">
                    Convert Now
                </button>
            </div>
            <p class="text-slate-500 text-sm mt-4 ml-2">Supports alphanumeric sections (e.g., 124A, 120B)</p>
        </div>

        <div id="resultCard" class="hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div class="bg-slate-900/50 border border-slate-800 p-6 rounded-2xl">
                    <span class="text-blue-400 text-xs font-bold uppercase tracking-widest">Original IPC</span>
                    <h2 id="ipcDisplay" class="text-4xl font-bold mt-2 text-white">SEC_---</h2>
                </div>
                <div class="bg-emerald-900/20 border border-emerald-500/30 p-6 rounded-2xl">
                    <span class="text-emerald-400 text-xs font-bold uppercase tracking-widest">BNS Equivalent</span>
                    <h2 id="bnsDisplay" class="text-4xl font-bold mt-2 text-emerald-400">SEC_---</h2>
                </div>
            </div>

            <div class="glass-card border border-slate-700 rounded-3xl overflow-hidden">
                <div class="bg-slate-800/50 px-8 py-4 border-b border-slate-700 flex justify-between items-center">
                    <h3 class="font-bold text-indigo-300">BPR&D Analysis & Legal Summary</h3>
                    <span class="bg-indigo-900/50 text-indigo-300 text-[10px] px-2 py-1 rounded-full uppercase border border-indigo-500/30">AI Verified</span>
                </div>
                <div id="analysisText" class="p-8 text-slate-300 leading-relaxed text-lg space-y-4">
                    </div>
            </div>
        </div>
    </div>

    <script>
        async function searchLaw() {
            const queryInput = document.getElementById('lawQuery').value.trim();
            const btn = document.getElementById('searchBtn');
            const resultCard = document.getElementById('resultCard');
            
            if (!queryInput) return;

            // Loading state
            btn.innerHTML = `<span class="flex items-center gap-2 italic">Processing...</span>`;
            btn.disabled = true;

            try {
                // YOUR ACTUAL RENDER URL
                const response = await fetch('https://ipc-to-bns.onrender.com/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: queryInput })
                });

                const data = await response.json();

                if (data.error) {
                    alert(data.error);
                } else {
                    resultCard.classList.remove('hidden');
                    document.getElementById('ipcDisplay').innerText = "SEC_" + queryInput.toUpperCase();
                    document.getElementById('bnsDisplay').innerText = "SEC_" + data.bns_section;
                    
                    // Simple Markdown-to-HTML formatting for the AI summary
                    const formattedText = data.analysis
                        .replace(/\*\*(.*?)\*\*/g, '<strong class="text-white">$1</strong>') // Bold
                        .replace(/\n\* /g, '<br>• ') // Bullets
                        .replace(/\n/g, '<br>'); // Line breaks
                    
                    document.getElementById('analysisText').innerHTML = formattedText;
                    
                    // Smooth scroll to result
                    resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            } catch (err) {
                console.error(err);
                alert("Connection Error: Backend might be starting up. Please try again in 30 seconds.");
            } finally {
                btn.innerText = "Convert Now";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
