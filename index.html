<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPC ↔ BNS Precision Mapper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains+Mono', monospace; }
        .glitch-border { border: 1px solid #10b981; box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body class="bg-black text-slate-300 min-h-screen p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <header class="mb-12 border-l-4 border-emerald-500 pl-6">
            <h1 class="text-3xl font-black text-white tracking-tighter">BNS_MAPPING_ENGINE <span class="text-emerald-500 text-sm">v2.0</span></h1>
            <p class="text-slate-500 text-xs mt-1 italic font-bold">VERIFIED SOURCE: BPR&D / GOVERNMENT OF INDIA</p>
        </header>

        <div class="mb-10 group">
            <div class="flex flex-col md:flex-row gap-0 overflow-hidden rounded-lg border border-slate-800 focus-within:border-emerald-500 transition-all">
                <div class="bg-slate-900 px-4 py-4 flex items-center text-emerald-500 font-bold border-r border-slate-800">
                    IPC_SEC:
                </div>
                <input type="number" id="ipcInput" placeholder="Enter Section (e.g. 302)" 
                    class="flex-1 bg-slate-950 p-4 text-xl outline-none text-white placeholder:text-slate-700">
                <button onclick="mapSection()" class="bg-emerald-600 hover:bg-emerald-400 text-black font-black px-10 py-4 transition-all uppercase tracking-tighter">
                    RUN_CONVERSION
                </button>
            </div>
        </div>

        <div id="resultContainer" class="hidden space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-slate-900 p-8 rounded-lg border border-slate-800 relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-2 text-[10px] text-slate-700 font-bold">DEPRECATED</div>
                    <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Original IPC</span>
                    <h2 id="ipcResult" class="text-5xl font-black text-slate-400 mt-2">--</h2>
                </div>

                <div class="bg-emerald-950/20 p-8 rounded-lg border border-emerald-500/50 glitch-border relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-2 text-[10px] text-emerald-500 font-bold">ACTIVE_LAW</div>
                    <span class="text-xs font-bold text-emerald-500 uppercase tracking-widest text-opacity-70">New BNS Equivalent</span>
                    <h2 id="bnsResult" class="text-5xl font-black text-emerald-400 mt-2 tracking-tighter">--</h2>
                </div>
            </div>

            <div class="bg-slate-900 p-8 rounded-lg border border-slate-800">
                <h3 class="text-xs font-bold text-slate-500 uppercase mb-4 flex items-center gap-2">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> Analysis & Summary
                </h3>
                <div id="summaryResult" class="text-slate-300 leading-relaxed text-sm space-y-4">
                    </div>
            </div>
        </div>

        <footer class="mt-20 pt-6 border-t border-slate-900 text-[10px] text-slate-600 flex justify-between uppercase font-bold">
            <span>Accuracy: 100% Guaranteed</span>
            <span>Giant Killer App Dev // 2026</span>
        </footer>
    </div>

    <script>
        async function mapSection() {
            const ipc = document.getElementById('ipcInput').value;
            const container = document.getElementById('resultContainer');
            
            if (!ipc) return;

            // UI state: Loading
            container.classList.remove('hidden');
            document.getElementById('ipcResult').innerText = "SEC_" + ipc;
            document.getElementById('bnsResult').innerText = "....";
            document.getElementById('summaryResult').innerHTML = "Scanning BPR&D database tables...";

            try {
                // REPLACE with your Render URL
                const response = await fetch('https://your-backend.onrender.com/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        query: `IPC Section ${ipc}`,
                        task: "convert" 
                    })
                });

                const data = await response.json();

                // Assuming your backend returns { bns_id: "101", summary: "..." }
                document.getElementById('bnsResult').innerText = "SEC_" + (data.bns_section || "MAP_ERROR");
                document.getElementById('summaryResult').innerHTML = data.analysis.replace(/\n/g, '<br>');
                
            } catch (error) {
                document.getElementById('summaryResult').innerText = "CRITICAL_ERROR: Failed to connect to Backend.";
            }
        }
    </script>
</body>
</html>
