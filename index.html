<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPC ↔ BNS Precision Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen font-mono">

    <div class="max-w-3xl mx-auto py-12 px-6">
        <header class="border-b border-slate-800 pb-6 mb-10">
            <h1 class="text-2xl font-bold text-emerald-400">COMMAND_LINE: LEGAL_CONVERTER_v1.0</h1>
            <p class="text-slate-500 text-sm mt-1">SOURCE: BPR&D OFFICIAL MAPPING DATA</p>
        </header>

        <div class="space-y-8">
            <div class="bg-slate-900 p-8 rounded-lg border border-slate-800 shadow-xl">
                <label class="block text-xs font-bold text-slate-400 uppercase mb-3">Input IPC Section Number</label>
                <div class="flex gap-4">
                    <input type="number" id="ipcInput" placeholder="e.g. 302" 
                        class="flex-1 bg-black border border-slate-700 p-4 rounded text-xl focus:border-emerald-500 outline-none text-emerald-500">
                    <button onclick="runConversion()" class="bg-emerald-600 hover:bg-emerald-500 text-black font-black px-8 rounded transition-all">
                        RUN_MAP
                    </button>
                </div>
            </div>

            <div id="result" class="hidden animate-in fade-in duration-500">
                <div class="grid grid-cols-2 gap-1 border border-slate-800 bg-slate-800">
                    <div class="bg-slate-900 p-6">
                        <span class="text-[10px] text-slate-500 font-bold uppercase">Original IPC</span>
                        <h2 id="outIpc" class="text-3xl font-bold text-slate-300 mt-2">--</h2>
                    </div>
                    <div class="bg-emerald-950/30 p-6 border-l border-slate-800">
                        <span class="text-[10px] text-emerald-500 font-bold uppercase">New BNS Equivalent</span>
                        <h2 id="outBns" class="text-3xl font-bold text-emerald-400 mt-2">--</h2>
                    </div>
                </div>
                
                <div class="bg-slate-900 border border-t-0 border-slate-800 p-6">
                    <span class="text-[10px] text-slate-500 font-bold uppercase">Legal Definition & Punishment Changes</span>
                    <div id="outDesc" class="mt-4 text-sm leading-relaxed text-slate-400 whitespace-pre-wrap"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function runConversion() {
            const val = document.getElementById('ipcInput').value;
            if(!val) return;

            // UI Reset
            const resBox = document.getElementById('result');
            resBox.classList.remove('hidden');
            document.getElementById('outIpc').innerText = "SEC_" + val;
            document.getElementById('outBns').innerText = "CALCULATING...";
            document.getElementById('outDesc').innerText = "Accessing Supabase BPR&D Records...";

            try {
                // REPLACE THIS with your ACTUAL Render Backend URL
                const BACKEND_URL = "https://your-backend-service.onrender.com/api/analyze";

                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ query: `Exactly map IPC Section ${val} to BNS using BPR&D data.` })
                });
                
                const data = await response.json();
                document.getElementById('outBns').innerText = "SEC_" + (data.bns_section || "CHECK_DESC");
                document.getElementById('outDesc').innerText = data.analysis;
            } catch (e) {
                document.getElementById('outDesc').innerText = "SYSTEM_ERROR: Backend connection failed.";
            }
        }
    </script>
</body>
</html>
