<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google-site-verification" content="lGHVQPu3G0P3ovv-fAA6sum0VWa48mVvoesy1EkbPzg" />
    <title>IPC ➔ BNS | Intelligent Transition Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.9);
            --header-bg: #fafafa;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --glass-border: rgba(226, 232, 240, 0.8);
            --pill-ipc-bg: #fee2e2;
            --pill-ipc-text: #991b1b;
            --pill-bns-bg: #dcfce7;
            --pill-bns-text: #166534;
        }

        [data-theme="dark"] {
            --primary: #3b82f6;
            --primary-dark: #60a5fa;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.8);
            --header-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --glass-border: rgba(51, 65, 85, 0.8);
            --pill-ipc-bg: #450a0a;
            --pill-ipc-text: #fecaca;
            --pill-bns-bg: #064e3b;
            --pill-bns-text: #bbf7d0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: background-color 0.3s, border-color 0.3s, color 0.3s; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container { width: 100%; max-width: 1000px; display: flex; flex-direction: column; gap: 24px; }

        .glass-header {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            position: relative;
        }

        .theme-toggle {
            position: absolute; top: 20px; right: 20px;
            background: none; border: 1px solid var(--glass-border);
            color: var(--text-main); padding: 8px; border-radius: 12px;
            cursor: pointer; font-size: 18px; display: flex; align-items: center;
        }

        .logo-badge {
            display: inline-block; background: var(--primary); color: white;
            padding: 6px 16px; border-radius: 100px; font-size: 12px;
            font-weight: 800; margin-bottom: 16px;
        }

        h1 { font-size: 32px; font-weight: 800; margin-bottom: 12px; }

        .search-container { 
            position: relative; 
            max-width: 500px; 
            margin: 30px auto 0; 
            display: flex;
        }

        input {
            width: 100%; padding: 18px 24px; font-size: 18px; border-radius: 16px;
            border: 2px solid var(--glass-border); background: var(--header-bg);
            color: var(--text-main); outline: none;
        }

        .btn-analyze {
            position: absolute; right: 8px; top: 8px; bottom: 8px;
            background: var(--primary); color: white; border: none;
            padding: 0 24px; border-radius: 10px; font-weight: 700; cursor: pointer;
        }

        .main-card {
            background: var(--card-bg); border-radius: 24px;
            border: 1px solid var(--glass-border); min-height: 400px;
            overflow: hidden; backdrop-filter: blur(10px);
        }

        .card-header {
            padding: 20px 32px; background: var(--header-bg);
            border-bottom: 1px solid var(--glass-border);
            display: flex; justify-content: space-between; align-items: center;
        }

        .comparison-hero {
            display: flex; align-items: center; justify-content: center;
            gap: 20px; padding: 40px; border-bottom: 1px solid var(--glass-border);
        }

        .pill { padding: 12px 24px; border-radius: 16px; font-weight: 800; font-size: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .pill.ipc { background: var(--pill-ipc-bg); color: var(--pill-ipc-text); }
        .pill.bns { background: var(--pill-bns-bg); color: var(--pill-bns-text); }

        .analysis-content { padding: 40px; font-size: 16px; line-height: 1.7; }
        .analysis-content h3 { color: var(--primary); margin: 30px 0 15px; border-bottom: 2px solid var(--glass-border); padding-bottom: 8px; }
        
        /* Table Responsiveness */
        .analysis-content table { 
            width: 100%; border-collapse: collapse; margin: 20px 0; 
            border: 1px solid var(--glass-border); display: table;
        }
        .analysis-content th { background: var(--header-bg); padding: 12px; text-align: left; color: var(--text-muted); }
        .analysis-content td { padding: 12px; border-top: 1px solid var(--glass-border); }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            body { padding: 15px 10px; }
            .glass-header { padding: 30px 20px; border-radius: 20px; }
            h1 { font-size: 24px; }
            
            .search-container { flex-direction: column; gap: 12px; }
            .btn-analyze { position: static; width: 100%; height: 55px; }
            
            .comparison-hero { flex-direction: column; padding: 30px 20px; }
            .arrow-icon { transform: rotate(90deg); margin: 5px 0; font-size: 24px; }
            .pill { width: 100%; text-align: center; font-size: 20px; }
            
            .analysis-content { padding: 25px 15px; }
            /* Make tables scrollable on small screens */
            .analysis-content table { display: block; overflow-x: auto; white-space: nowrap; }
            
            .card-header { flex-direction: column; gap: 10px; text-align: center; }
        }

        #loader { display: none; padding: 80px; text-align: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--glass-border); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .copy-btn { background: var(--header-bg); border: 1px solid var(--glass-border); color: var(--text-main); padding: 8px 16px; border-radius: 10px; cursor: pointer; display: none; }
    </style>
</head>
<body>

<div class="container">
    <header class="glass-header">
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-icon">🌙</button>
        <span class="logo-badge">BHARATIYA NYAYA SANHITA 2023</span>
        <h1>Legal Transition Engine</h1>
        <p style="color: var(--text-muted); font-size: 14px;">Instant IPC to BNS Conversion & Analysis</p>
        
        <div class="search-container">
            <input type="text" id="ipc-input" inputmode="numeric" placeholder="Enter IPC Section (e.g. 302)" onkeypress="if(event.key==='Enter') analyzeLaw()">
            <button class="btn-analyze" onclick="analyzeLaw()">Analyze</button>
        </div>
    </header>

    <main class="main-card">
        <div class="card-header">
            <span id="result-status" style="font-weight: 700; font-size: 14px; color: var(--text-muted);">Awaiting Query</span>
            <button class="copy-btn" id="copy-btn" onclick="copyToClipboard()">📋 Copy Analysis</button>
        </div>
        
        <div id="loader">
            <div class="spinner"></div>
            <p style="font-weight: 600;">Consulting Legal Database...</p>
        </div>

        <div id="output">
            <div style="padding:100px 20px; text-align:center; color:var(--text-muted);">
                Search an IPC section to see its BNS counterpart and unbundling details.
            </div>
        </div>
    </main>
</div>

<script>
    function toggleTheme() {
        const html = document.documentElement;
        const icon = document.getElementById('theme-icon');
        if (html.getAttribute('data-theme') === 'light') {
            html.setAttribute('data-theme', 'dark');
            icon.innerText = '☀️';
            localStorage.setItem('theme', 'dark');
        } else {
            html.setAttribute('data-theme', 'light');
            icon.innerText = '🌙';
            localStorage.setItem('theme', 'light');
        }
    }

    if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.getElementById('theme-icon').innerText = '☀️';
    }

    async function analyzeLaw() {
        const input = document.getElementById('ipc-input').value.trim();
        const output = document.getElementById('output');
        const loader = document.getElementById('loader');
        const status = document.getElementById('result-status');
        const copyBtn = document.getElementById('copy-btn');

        if (!input) return;
        
        output.innerHTML = '';
        loader.style.display = 'block';
        status.innerText = "Analyzing Transition...";
        copyBtn.style.display = 'none';

        try {
            const response = await fetch('https://ipc-to-bns.onrender.com/api/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: input })
            });
            
            const data = await response.json();
            
            if (data.error) {
                output.innerHTML = `
                    <div style="padding:60px 20px; color:#ef4444; text-align:center;">
                        <div style="font-size:40px; margin-bottom:10px;">⚠️</div>
                        <div style="font-weight:700;">${data.error}</div>
                        <div style="margin-top:10px; color:var(--text-muted);">${data.suggestion || ''}</div>
                    </div>`;
                status.innerText = "Not Found";
            } else {
                copyBtn.style.display = 'block';
                status.innerText = `Matched: IPC ${data.ipc_section}`;
                output.innerHTML = `
                    <div class="comparison-hero">
                        <div class="pill ipc">IPC ${data.ipc_section}</div>
                        <div class="arrow-icon" style="font-size:30px; font-weight:bold; color:var(--text-muted);">➔</div>
                        <div class="pill bns">BNS ${data.primary_bns}</div>
                    </div>
                    <div class="analysis-content">${marked.parse(data.analysis)}</div>`;
            }
        } catch (err) {
            output.innerHTML = `<div style="padding:60px; text-align:center; color:#ef4444;">Server Connection Failed. Please try again.</div>`;
            status.innerText = "Error";
        } finally { 
            loader.style.display = 'none'; 
        }
    }

    function copyToClipboard() {
        const content = document.getElementById('output').innerText;
        navigator.clipboard.writeText(content).then(() => {
            const btn = document.getElementById('copy-btn');
            btn.innerText = "✅ Copied!";
            setTimeout(() => { btn.innerText = "📋 Copy Analysis"; }, 2000);
        });
    }
</script>
</body>
</html>
