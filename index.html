<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal Bridge | IPC-BNS Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bns-card { background: linear-gradient(135deg, #065f46 0%, #064e3b 100%); }
        .related-chip { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 min-h-screen p-6 font-sans">

    <div class="max-w-4xl mx-auto py-10">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">Legal Bridge</h1>
            <p class="text-slate-500 mt-2">Intelligent IPC to BNS Mapping System</p>
        </div>

        <div class="bg-slate-900/50 p-6 rounded-3xl border border-slate-800 mb-8">
            <div class="flex gap-3">
                <input type="text" id="lawQuery" class="flex-1 bg-slate-950 border border-slate-700 rounded-2xl px-6 py-4 text-xl focus:ring-2 focus:ring-blue-500 outline-none uppercase" placeholder="e.g. 376, 124A, 498A">
                <button onclick="searchLaw()" id="btn" class="bg-blue-600 hover:bg-blue-500 px-8 py-4 rounded-2xl font-bold transition-all">Analyze</button>
            </div>
        </div>

        <div id="results" class="hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl">
                    <p class="text-blue-400 text-xs font-bold uppercase tracking-widest">Original IPC</p>
                    <h2 id="ipcNum" class="text-4xl font-black mt-2">---</h2>
                </div>

                <div class="bns-card p-6 rounded-3xl shadow-xl relative overflow-hidden">
                    <p class="text-emerald-300 text-xs font-bold uppercase tracking-widest text-white/70">General Punishment (BNS)</p>
                    <h2 id="bnsPrimary" class="text-4xl font-black mt-2 text-white">---</h2>
                    
                    <div id="relatedBox" class="mt-4 hidden border-t border-white/10 pt-4">
                        <p class="text-[10px] font-bold text-white/50 mb-2">SPECIFIC PARALLEL SECTIONS:</p>
                        <div id="relatedList" class="flex flex-wrap gap-2"></div>
                    </div>
                </div>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-3xl overflow-hidden">
                <div class="bg-slate-800/50 px-6 py-3 border-b border-slate-800">
                    <h3 class="text-sm font-bold text-slate-400">Legal Transition Analysis</h3>
                </div>
                <div id="aiText" class="p-8 text-slate-300 leading-relaxed space-y-4 text-lg"></div>
            </div>
        </div>
    </div>

    <script>
        async function searchLaw() {
            const query = document.getElementById('lawQuery').value.trim();
            const btn = document.getElementById('btn');
            if(!query) return;

            btn.innerText = "Analyzing...";
            btn.disabled = true;

            try {
                const res = await fetch('https://ipc-to-bns.onrender.com/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });
                const data = await res.json();

                if(data.error) {
                    alert(data.error);
                } else {
                    document.getElementById('results').classList.remove('hidden');
                    document.getElementById('ipcNum').innerText = "SEC_" + query.toUpperCase();
                    document.getElementById('bnsPrimary').innerText = "SEC_" + data.primary_bns;

                    const relBox = document.getElementById('relatedBox');
                    const relList = document.getElementById('relatedList');
                    relList.innerHTML = "";
                    
                    if(data.related_bns.length > 0) {
                        relBox.classList.remove('hidden');
                        data.related_bns.forEach(sec => {
                            relList.innerHTML += `<span class="related-chip text-[11px] font-bold px-3 py-1 rounded-full text-white">SEC_${sec}</span>`;
                        });
                    } else {
                        relBox.classList.add('hidden');
                    }

                    document.getElementById('aiText').innerHTML = data.analysis.replace(/\n/g, '<br>');
                }
            } catch(e) {
                alert("Server error. Check if backend is running.");
            } finally {
                btn.innerText = "Analyze";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
