<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BNS Legal AI Assistant</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h1 { color: #2c3e50; text-align: center; font-size: 24px; }
        .input-group { display: flex; margin-top: 20px; }
        input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 6px 0 0 6px; outline: none; }
        button { padding: 12px 20px; border: none; background: #27ae60; color: white; border-radius: 0 6px 6px 0; cursor: pointer; font-weight: bold; }
        button:hover { background: #219150; }
        #result { margin-top: 20px; padding: 15px; border-radius: 6px; background: #f9f9f9; display: none; line-height: 1.6; color: #34495e; }
        .loader { display: none; text-align: center; margin-top: 10px; font-style: italic; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚖️ BNS Legal Assistant</h1>
    <p style="text-align: center; color: #7f8c8d;">Search Bhartiya Nyaya Sanhita Laws</p>
    
    <div class="input-group">
        <input type="text" id="userQuery" placeholder="Ask about a crime or section (e.g. Theft)...">
        <button onclick="askAI()">Search</button>
    </div>

    <div class="loader" id="loader">Consulting AI and BPR&D Records...</div>
    <div id="result"></div>
</div>

<script>
    async function askAI() {
        const query = document.getElementById('userQuery').value;
        const resultDiv = document.getElementById('result');
        const loader = document.getElementById('loader');

        if (!query) return alert("Please enter a question.");

        // Show loader, hide previous result
        loader.style.display = "block";
        resultDiv.style.display = "none";

        try {
            // REPLACE THIS URL with your actual Render URL
            const response = await fetch('https://your-app-name.onrender.com/api/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: query })
            });

            const data = await response.json();
            
            loader.style.display = "none";
            resultDiv.style.display = "block";
            
            if (data.analysis) {
                resultDiv.innerHTML = `<strong>Legal Analysis:</strong><br>${data.analysis.replace(/\n/g, '<br>')}`;
            } else {
                resultDiv.innerText = "Error: " + (data.error || "Something went wrong.");
            }
        } catch (error) {
            loader.style.display = "none";
            resultDiv.style.display = "block";
            resultDiv.innerText = "Could not connect to backend. Make sure your Render app is awake!";
        }
    }
</script>

</body>
</html>
