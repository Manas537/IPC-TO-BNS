<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPC to BNS Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center p-6">

    <div class="max-w-2xl w-full space-y-8">
        <header class="text-center">
            <h1 class="text-4xl font-bold text-blue-400">IPC ➔ BNS</h1>
            <p class="text-slate-400 mt-2">Bharatiya Nyaya Sanhita 2023 Transition Tool</p>
        </header>

        <div class="bg-slate-800 p-6 rounded-xl shadow-xl border border-slate-700">
            <label class="block text-sm font-medium mb-2 text-slate-300">Enter IPC Section (e.g., 302, 124A, 120B)</label>
            <div class="flex gap-4">
                <input type="text" id="lawQuery" 
                    class="flex-1 bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 uppercase"
                    placeholder="e.g. 124A"
                    onkeypress="if(event.key === 'Enter') searchLaw()">
                
                <button onclick="searchLaw()" id="searchBtn"
                    class="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-lg font-semibold transition-all">
                    Search
                </button>
            </div>
        </div>

        <div id="resultCard" class="hidden space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-800 p-4 rounded-lg border border-slate-700">
                    <p class="text-xs text-slate-400 uppercase">Original IPC</p>
                    <h2 id="ipcDisplay" class="text-2xl font-bold text-slate-200">SEC_---</h2>
                </div>
                <div class="bg-green-900/30 p-4 rounded-lg border border-green-500/50">
                    <p class="text-xs text-green-400 uppercase">BNS Equivalent</p>
                    <h2 id="bnsDisplay" class="text-2xl font-bold text-green-400">SEC_---</h2>
                </div>
            </div>

            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                <h3 class="text-lg font-semibold mb-4 text-blue-300">BPR&D Analysis & Summary</h3>
                <div id="analysisText" class="text-slate-300 leading-relaxed prose prose-invert max-w-none">
                    </div>
            </div>
        </div>
    </div>

    <script>
        async function searchLaw() {
            const queryInput = document.getElementById('lawQuery').value.trim();
            const btn = document.getElementById('searchBtn');
            
            if (!queryInput) return alert("Please enter a section number.");

            // UI Loading State
            btn.innerText = "Analyzing...";
            btn.disabled = true;

            try {
                // UPDATE THIS URL to your actual Render backend URL
                const response = await fetch('https://YOUR-RENDER-APP-NAME.onrender.com/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: queryInput })
                });

                const data = await response.json();

                if (data.error) {
                    alert(data.error);
                } else {
                    document.getElementById('resultCard').classList.remove('hidden');
                    document.getElementById('ipcDisplay').innerText = "SEC_" + queryInput.toUpperCase();
                    document.getElementById('bnsDisplay').innerText = "SEC_" + data.bns_section;
                    
                    // Convert line breaks or markdown-style bullets to HTML
                    document.getElementById('analysisText').innerHTML = data.analysis.replace(/\n/g, '<br>');
                }
            } catch (err) {
                console.error(err);
                alert("Server connection failed. Make sure your Render backend is awake!");
            } finally {
                btn.innerText = "Search";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
