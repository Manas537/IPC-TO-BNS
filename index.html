<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPC-BNS Navigator</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* Side-by-Side Layout */
        .container {
            display: flex;
            width: 100%;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Sidebar/Control Panel */
        .controls {
            flex: 1;
            max-width: 350px;
            background: var(--card);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        /* Main Output Area */
        .output-area {
            flex: 2;
            background: var(--card);
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .output-header {
            padding: 15px 25px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f1f5f9;
        }

        #result-content {
            padding: 30px;
            overflow-y: auto;
            line-height: 1.6;
        }

        /* Table Styling for AI Responses */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        th, td {
            padding: 12px;
            border: 1px solid var(--border);
            text-align: left;
        }

        th { background: #f8fafc; font-weight: 600; }

        /* Button Styling */
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0 20px;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }

        .copy-btn {
            width: auto;
            padding: 8px 15px;
            background: #fff;
            color: var(--text);
            border: 1px solid var(--border);
            font-size: 13px;
        }

        .copy-btn.success {
            border-color: #22c55e;
            color: #16a34a;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="controls">
        <h2>Search</h2>
        <p style="font-size: 14px; color: #64748b;">Enter an IPC section to see the BNS transition mapping.</p>
        <input type="text" id="ipc-input" placeholder="e.g. 302">
        <button onclick="analyzeLaw()">Analyze Transition</button>
        
        <div id="loading" style="display:none; margin-top: 20px; text-align: center; color: #64748b;">
            Crunching legal data...
        </div>
    </div>

    <div class="output-area">
        <div class="output-header">
            <span id="output-title">Analysis Result</span>
            <button class="copy-btn" id="copy-btn" onclick="copyResult()">Copy Analysis</button>
        </div>
        <div id="result-content">
            <p style="color: #94a3b8;">Analysis will appear here after search.</p>
        </div>
    </div>
</div>

<script>
    async function analyzeLaw() {
        const query = document.getElementById('ipc-input').value;
        const content = document.getElementById('result-content');
        const loader = document.getElementById('loading');
        
        if (!query) return alert("Please enter a section");

        loader.style.display = 'block';
        content.style.opacity = '0.5';

        try {
            // Replace with your actual Render URL
            const response = await fetch('https://your-render-app.onrender.com/api/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: query })
            });

            const data = await response.json();
            
            if (data.error) {
                content.innerHTML = `<p style="color: red;">${data.error}</p>`;
            } else {
                // We use innerHTML because the AI returns Markdown-style tables
                // In a real app, use a markdown library, but for now:
                content.innerHTML = formatAIResponse(data.analysis);
                document.getElementById('output-title').innerText = `IPC ${data.ipc_section} → BNS Analysis`;
            }
        } catch (err) {
            content.innerHTML = `<p style="color: red;">Failed to connect to server.</p>`;
        } finally {
            loader.style.display = 'none';
            content.style.opacity = '1';
        }
    }

    // Simple function to handle basic markdown-to-html for tables
    function formatAIResponse(text) {
        // This replaces newlines with breaks and handles basic markdown bolding
        return text
            .replace(/\n/g, '<br>')
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/### (.*?)/g, '<h3>$1</h3>');
    }

    function copyResult() {
        const text = document.getElementById('result-content').innerText;
        const btn = document.getElementById('copy-btn');
        
        navigator.clipboard.writeText(text).then(() => {
            btn.innerText = '✓ Copied!';
            btn.classList.add('success');
            setTimeout(() => {
                btn.innerText = 'Copy Analysis';
                btn.classList.remove('success');
            }, 2000);
        });
    }
</script>

</body>
</html>
