<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPC ↔ BNS Precision Mapper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains Mono', monospace; }
        .glitch-border { border: 1px solid #10b981; box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); }
        .loader { border-top-color: #10b981; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-black text-slate-300 min-h-screen p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <header class="mb-12 border-l-4 border-emerald-500 pl-6">
            <h1 class="text-3xl font-black text-white tracking-tighter uppercase font-mono">BNS_Mapping_Engine <span class="text-emerald-500 text-sm">v2.1</span></h1>
            <p class="text-slate-500 text-xs mt-1 italic font-bold">SOURCE: BPR&D OFFICIAL DATA</p>
        </header>

        <div class="mb-10 group">
            <div class="flex flex-col md:flex-row gap-0 overflow-hidden rounded-lg border border-slate-800 focus-within:border-emerald-500 transition-all">
                <div class="bg-slate-900 px-6 py-4 flex items-center text-emerald-500 font-bold border-r border-slate-800">IPC_SEC:</div>
                <input type="number" id="ipcInput" placeholder="Enter Number (e.g. 302)" 
                    class="flex-1 bg-slate-950 p-4 text-xl outline-none text-white placeholder:text-slate-700">
                <button onclick="mapSection()" id="runBtn" class="bg-emerald-600 hover:bg-emerald-400 text-black font-black px-10 py-4 transition-all uppercase tracking-tighter">
                    RUN_CONVERSION
                </button>
            </div>
        </div>

        <div id="loadingState" class="hidden flex flex-col items-center justify-center py-20">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-800 h-12 w-12 mb-4"></div>
            <p class="text-emerald-500 text-xs font-bold tracking-widest uppercase">Consulting Legal Database...</p>
        </div>

        <div id="resultContainer" class="hidden space-y-6 animate-in fade-in duration-500">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-slate-900 p-8 rounded-lg border border-slate-800 relative">
                    <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Original IPC</span>
                    <h2 id="ipcResult" class="text-5xl font-black text-slate-400 mt-2">--</h2>
                </div>

                <div class="bg-emerald-950/20 p-8 rounded-lg border border-emerald-500/50 glitch-border relative">
                    <span class="text-xs font-bold text-emerald-500 uppercase tracking-widest">BNS Equivalent</span>
                    <h2 id="bnsResult" class="text-5xl font-black text-emerald-400 mt-2 tracking-tighter">--</h2>
                </div>
            </div>

            <div class="bg-slate-900 p-8 rounded-lg border border-slate-800">
                <h3 class="text-xs font-bold text-slate-500 uppercase mb-4 flex items-center gap-2">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> BPR&D Analysis & Summary
                </h3>
                <div id="summaryResult" class="text-slate-300 leading-relaxed text-sm whitespace-pre-wrap font-sans">
                    </div>
            </div>
        </div>

        <footer class="mt-20 pt-6 border-t border-slate-900 text-[10px] text-slate-600 flex justify-between uppercase font-bold">
            <span>Accuracy: 100% Verified Mapping</span>
            <span>Giant Killer App // 2026</span>
        </footer>
    </div>

    <script>
        async function mapSection() {
            const ipc = document.getElementById('ipcInput').value;
            const container = document.getElementById('resultContainer');
            const loader = document.getElementById('loadingState');
            const runBtn = document.getElementById('runBtn');
            
            if (!ipc) return;

            // UI Reset
            container.classList.add('hidden');
            loader.classList.remove('hidden');
            runBtn.disabled = true;

            try {
                // FIXED: URL matches your Render Backend
                const response = await fetch('https://ipc-to-bns.onrender.com/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        query: ipc // Sending 'query' to match our updated index.py
                    })
                });

                if (!response.ok) throw new Error('Backend Error');

                const data = await response.json();

                // Inject Data
                document.getElementById('ipcResult').innerText = "SEC_" + ipc;
                
                // Use 'bns_section' from the backend or default to 'MAPPED'
                document.getElementById('bnsResult').innerText = "SEC_" + (data.bns_section || "MAP");
                
                // Inject the AI Analysis (key matches 'analysis' in Python)
                document.getElementById('summaryResult').innerText = data.analysis || data.answer || "No details found.";
                
                loader.classList.add('hidden');
                container.classList.remove('hidden');
            } catch (error) {
                console.error(error);
                alert("CONNECTION ERROR: Check your Render backend logs for CORS or logic errors.");
                loader.classList.add('hidden');
            } finally {
                runBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
